name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - "release/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: onlooker_test
          POSTGRES_USER: onlooker
          POSTGRES_PASSWORD: onlooker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onlooker -d onlooker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://onlooker:onlooker@localhost:5432/onlooker_test
      AUTO_INITIALIZE_DB: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt

      - name: Run Alembic migrations
        run: python -m alembic -c alembic.ini upgrade head

      - name: Run test suite
        run: python -m pytest -q

      - name: Run calibration envelope validation (strict)
        run: python scripts/generate_calibration_report.py --strict

  phase8-smoke:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: onlooker_test
          POSTGRES_USER: onlooker
          POSTGRES_PASSWORD: onlooker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onlooker -d onlooker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://onlooker:onlooker@localhost:5432/onlooker_test
      AUTO_INITIALIZE_DB: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt

      - name: Run Alembic migrations
        run: python -m alembic -c alembic.ini upgrade head

      - name: Start API server
        run: nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/onlooker-api.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become healthy"
          cat /tmp/onlooker-api.log || true
          exit 1

      - name: Run Phase 8 smoke test
        run: python scripts/phase8_smoke_test.py --base-url http://127.0.0.1:8000/api/v1

  production-readiness-gates:
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: onlooker_test
          POSTGRES_USER: onlooker
          POSTGRES_PASSWORD: onlooker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onlooker -d onlooker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://onlooker:onlooker@localhost:5432/onlooker_test
      AUTO_INITIALIZE_DB: "false"
      SIMULATION_SLO_P95_MS: "1200"
      SIMULATION_SLO_P99_MS: "2000"
      SIMULATION_ERROR_BUDGET_RATE: "0.02"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt

      - name: Install security toolchain
        run: python -m pip install pip-audit bandit

      - name: Run dependency vulnerability audit
        run: python -m pip_audit -r requirements.txt

      - name: Run static application security tests
        run: python -m bandit -r app scripts -x tests -lll -ii

      - name: Run Alembic migrations
        run: python -m alembic -c alembic.ini upgrade head

      - name: Run calibration envelope validation (strict)
        run: python scripts/generate_calibration_report.py --strict

      - name: Run external field validation (strict)
        run: python scripts/run_field_validation.py --dataset docs/field_validation_benchmark.csv --strict

      - name: Run model drift gate (strict)
        run: python scripts/check_model_drift.py --strict

      - name: Start API server
        run: nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/onlooker-api-gates.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become healthy"
          cat /tmp/onlooker-api-gates.log || true
          exit 1

      - name: Run DAST gate (strict)
        run: python scripts/security_dast_gate.py --base-url http://127.0.0.1:8000/api/v1 --strict

      - name: Run performance and reliability gate (strict)
        run: >-
          python scripts/performance_reliability_gate.py
          --base-url http://127.0.0.1:8000/api/v1
          --p95-budget-ms ${SIMULATION_SLO_P95_MS}
          --p99-budget-ms ${SIMULATION_SLO_P99_MS}
          --error-budget-rate ${SIMULATION_ERROR_BUDGET_RATE}
          --strict

      - name: Run failure-mode chaos gate (strict)
        run: python scripts/failure_mode_chaos_gate.py --base-url http://127.0.0.1:8000/api/v1 --strict

      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run backup and restore drill (strict)
        run: python scripts/backup_restore_drill.py --strict

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-production-readiness-artifacts
          path: backend/artifacts/
