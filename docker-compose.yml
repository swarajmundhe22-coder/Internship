"""Docker Compose for local development of Patent Platform."""

version: "3.9"

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: patent-db
    environment:
      POSTGRES_USER: patent_user
      POSTGRES_PASSWORD: patent_password
      POSTGRES_DB: patent_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patent_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: patent-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: patent-api
    environment:
      DATABASE_URL: "postgresql+asyncpg://patent_user:patent_password@postgres:5432/patent_platform"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: "development"
      LOG_LEVEL: "DEBUG"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn backend.app.main:app --reload --host 0.0.0.0 --port 8000
      "

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: patent-web
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: patent-network
